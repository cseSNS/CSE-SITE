services:
  cse-site:
    build: .
    container_name: cse-site
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATA_DIR: "/data"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN in .env or Portainer}"
      ADMIN_PATH: "${ADMIN_PATH:?set ADMIN_PATH in .env or Portainer}"
      CSE_NOTIFICATION_WEBHOOK: "${CSE_NOTIFICATION_WEBHOOK:-}"
    volumes:
      - cse_data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  cse_data:
