services:
  postgres:
    image: postgres:16-alpine
    container_name: cse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cse}"
      POSTGRES_USER: "${POSTGRES_USER:-cse}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env or Portainer}"
    volumes:
      - cse_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cse} -d ${POSTGRES_DB:-cse}"]
      interval: 30s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  cse-site:
    image: "${CSE_SITE_IMAGE:-ghcr.io/csesns/cse-site:latest}"
    container_name: cse-site
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PORT: "8080"
      DATA_DIR: "/data"
      DATABASE_URL: "postgres://${POSTGRES_USER:-cse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cse}"
      ADMIN_PATH: "${ADMIN_PATH:?set ADMIN_PATH in .env or Portainer}"
      ADMIN_BOOTSTRAP_EMAIL: "${ADMIN_BOOTSTRAP_EMAIL:?set ADMIN_BOOTSTRAP_EMAIL in .env or Portainer}"
      ADMIN_BOOTSTRAP_PASSWORD: "${ADMIN_BOOTSTRAP_PASSWORD:?set ADMIN_BOOTSTRAP_PASSWORD in .env or Portainer}"
      ADMIN_BOOTSTRAP_NAME: "${ADMIN_BOOTSTRAP_NAME:-Administrateur CSE}"
      ADMIN_SESSION_MAX_AGE_SECONDS: "${ADMIN_SESSION_MAX_AGE_SECONDS:-14400}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      MAIL_SETTINGS_ENCRYPTION_KEY: "${MAIL_SETTINGS_ENCRYPTION_KEY:?set MAIL_SETTINGS_ENCRYPTION_KEY in .env or Portainer}"
      VOTE_COOKIE_SECRET: "${VOTE_COOKIE_SECRET:?set VOTE_COOKIE_SECRET in .env or Portainer}"
      CSE_NOTIFICATION_WEBHOOK: "${CSE_NOTIFICATION_WEBHOOK:-}"
    volumes:
      - cse_data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  cse_data:
  cse_postgres:
