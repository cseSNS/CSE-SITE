<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Documents et PV du CSE">
    <title>CSE | PV et documents</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="/" aria-label="Accueil CSE"><span class="brand-mark">CSE</span><span class="brand-copy">Espace collaborateurs</span></a>
      <button class="nav-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false" data-nav-toggle><span></span><span></span></button>
      <nav class="main-nav" data-nav>
        <a href="/une.html">A la une</a>
        <a href="/actualites.html">Actualit&eacute;s</a>
        <a href="/infos.html">Infos CSE</a>
        <a href="/agenda.html">Agenda</a>
        <a href="/documents.html">PV &amp; documents</a>
        <a href="/idees.html">Id&eacute;es</a>
        <a href="/membres.html">Membres</a>
        <a href="/recherche.html">Recherche</a>
      </nav>
    </header>
    <main>
      <section class="subpage-hero">
        <p class="eyebrow">Biblioth&egrave;que</p>
        <h1>PV et documents utiles</h1>
        <p>Consultez les proc&egrave;s-verbaux, ordres du jour, guides et documents mis &agrave; disposition par le CSE.</p>
      </section>
      <section class="section documents-section">
        <div class="page-controls document-controls">
          <label>Rechercher <input type="search" data-document-search placeholder="Titre ou description"></label>
          <label>Type <select data-document-kind-filter><option value="all">Tous les documents</option><option value="pv">PV</option><option value="odj">Ordres du jour</option><option value="avantages">Avantages</option><option value="guide">Guides</option></select></label>
        </div>
        <div class="documents-list" data-document-list></div>
      </section>
      <section class="section documents-section document-viewer-section" data-public-document-viewer hidden>
        <div class="document-viewer-heading">
          <div>
            <p class="eyebrow">Consultation</p>
            <h2 data-public-document-title>Document CSE</h2>
          </div>
          <button class="viewer-close" type="button" data-close-public-document-viewer aria-label="Fermer le lecteur" title="Fermer le lecteur">&times;</button>
        </div>
        <div class="pdf-viewer">
          <iframe data-public-pdf-frame title="Lecteur PDF du document CSE" referrerpolicy="no-referrer"></iframe>
        </div>
      </section>
    </main>
    <footer class="site-footer"><span>CSE &middot; Documents</span><a href="/">Accueil</a></footer>
  </body>
</html>
